name: Update Wayland Protocols

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

jobs:
  update-wayland-protocols:
    name: Update Wayland Protocols
    if: github.repository == 'GamesTrap/TRAP'
    runs-on: [self-hosted, Linux, X64, ubuntu, "26.04", cpu]
    steps:
      - name: Cleanup workspace
        if: ${{ always() }}
        uses: gamestrap/gha-workspace-cleanup@v1.2.5
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'false'
          ref: dev
      - uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: TRAP CI/CD
      - name: Make python3 available as python
        run: sudo update-alternatives --install /usr/bin/python python /usr/bin/python3 10
      - name: Make pip3 available as pip
        run: sudo update-alternatives --install /usr/bin/pip pip /usr/bin/pip3 10
      - uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Make scripts and premake executable
        run: |
          chmod +x libs/premake5/linux/premake5
          chmod +x GeneratorScripts/GenerateWaylandProtocols.sh
      - name: Update Wayland Protocols
        run: |
          cd GeneratorScripts/
          ./GenerateWaylandProtocols.sh
          cd ..
      - name: Retrieve todays date
        id: get-date
        run: echo "CURRENT_DATE=$(date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: dev
          branch: wayland-protocols-update/${{steps.get-date.outputs.CURRENT_DATE}}
          delete-branch: true
          commit-message: "Update Wayland Protocols to ${{steps.get-date.outputs.CURRENT_DATE}}"
          title: "Update Wayland Protocols to ${{steps.get-date.outputs.CURRENT_DATE}}"
          labels: "CI/CD, Input, Update"
          assignees: "GamesTrap"
          milestone: 5
          token: ${{steps.generate-token.outputs.token}}
          author: "TRAP CI/CD <no-reply@trappedgames.de>"
          committer: "TRAP CI/CD <no-reply@trappedgames.de>"
